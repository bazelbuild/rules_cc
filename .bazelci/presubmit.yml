---
build_targets: &build_targets
  - "//:all"
  - "//cc/..."
  - "//examples/..."
  - "//tests/..."
  - "-//tests/rule_based_toolchain/tool_map:_duplicate_action_test_subject" # Intentionally broken rule.
test_targets: &test_targets
  - "//:all"
  - "//cc/..."
  - "//examples/..."
  - "//tests/..."
  - "-//tests/system_library:system_library_test" # Only intended to work in WORKSPACE files
  - "-//tests/rule_based_toolchain/tool_map:_duplicate_action_test_subject" # Intentionally broken rule.

flags_bazel_less_than_9: &flags_bazel_less_than_9
  - "--deleted_packages=//tests/local_includes"

build_targets_bazel_6: &build_targets_bazel_6
  - "//:all"
  - "//cc:all"
  - "//examples/..."
  - "//tests/..."
  - "-//tests/rule_based_toolchain/..." # proto.encode_text doesn't support None
  - "-//cc:optional_current_cc_toolchain" # Not supported in Bazel 6
  - "-//tests/rule_based_toolchain/tool_map:_duplicate_action_test_subject" # Intentionally broken rule.
test_targets_bazel_6: &test_targets_bazel_6
  - "//:all"
  - "//cc:all"
  - "//examples/..."
  - "//tests/..."
  - "-//tests/rule_based_toolchain/..." # proto.encode_text doesn't support None
  - "-//cc:optional_current_cc_toolchain" # Not supported in Bazel 6
  - "-//tests/rule_based_toolchain/tool_map:_duplicate_action_test_subject" # Intentionally broken rule.
  - "-//tests/system_library:system_library_test" # Should be skipped on Windows and MacOS
  - "-//tests/cc/common:test_runtime_dynamic_libraries_copy_behavior" # known bug, see https://github.com/bazelbuild/rules_cc/pull/623
  - "-//tests/strip_include_prefix:test_include_textual"  # Not supported in bazel <9.

common_coverage_flags: &common_coverage_flags
  # Starting in Bazel 9 coverage collection causes some tests to fail.
  # https://github.com/bazelbuild/rules_cc/issues/613
  - "--test_env=IGNORE_COVERAGE_COLLECTION_FAILURES=1"
  # Test failures are not collected under `coverage` invocations.
  # https://github.com/bazelbuild/continuous-integration/issues/1838
  - "--test_output=errors"

coverage_flags_bazel_less_than_9: &coverage_flags_bazel_less_than_9
  # See above
  - "--test_env=IGNORE_COVERAGE_COLLECTION_FAILURES=1"
  - "--test_output=errors"
  - "--deleted_packages=//tests/local_includes"

buildifier:
  version: latest

tasks:
  ubuntu2004_docs:
    name: Docs
    platform: ubuntu2004
    build_targets:
      - "//docs/..."
    test_targets:
      - "//docs/..."

# Bazel@HEAD
  ubuntu2004_head:
    name: Ubuntu 20.04 (Bazel HEAD)
    bazel: last_green
    platform: ubuntu2004
    build_targets: *build_targets
    test_targets:
      - "//:all"
      - "//cc/..."
      - "//examples/..."
      - "//tests/..."
      - "-//tests/rule_based_toolchain/tool_map:_duplicate_action_test_subject" # Intentionally broken rule.
  macos_intel_head:
    name: MacOS Intel (Bazel HEAD)
    bazel: last_green
    platform: macos
    build_targets: *build_targets
    test_targets: *test_targets
  macos_head:
    name: MacOS (Bazel HEAD)
    bazel: last_green
    platform: macos_arm64
    build_targets: *build_targets
    test_targets: *test_targets
  windows_head:
    name: Windows (Bazel HEAD)
    bazel: last_green
    platform: windows
    build_targets: *build_targets
    test_targets: *test_targets

  # Bazel@rolling
  ubuntu2004_rolling:
    name: Ubuntu 20.04 (Bazel rolling)
    bazel: rolling
    platform: ubuntu2004
    build_targets: *build_targets
    test_targets:
    - "//:all"
    - "//cc/..."
    - "//examples/..."
    - "//tests/..."
    - "-//tests/rule_based_toolchain/tool_map:_duplicate_action_test_subject" # Intentionally broken rule.
  macos_intel_rolling:
    name: MacOS Intel (Bazel rolling)
    bazel: rolling
    platform: macos
    build_targets: *build_targets
    test_targets: *test_targets
    coverage_flags: *common_coverage_flags
    coverage_targets: *test_targets
  macos_rolling:
    name: MacOS (Bazel rolling)
    bazel: rolling
    platform: macos_arm64
    build_targets: *build_targets
    test_targets: *test_targets
    coverage_flags: *common_coverage_flags
    coverage_targets: *test_targets
  windows_rolling:
    name: Windows (Bazel rolling)
    bazel: rolling
    platform: windows
    build_targets: *build_targets
    test_targets: *test_targets

# Bazel 7
  ubuntu2004_bazel_7:
    name: Ubuntu 20.04 (Bazel 7)
    bazel: 7.x
    platform: ubuntu2004
    build_targets: *build_targets_bazel_6
    test_targets: *test_targets_bazel_6
    build_flags: *flags_bazel_less_than_9
    test_flags: *flags_bazel_less_than_9
    coverage_flags: *coverage_flags_bazel_less_than_9
    coverage_targets: *test_targets_bazel_6
  macos_intel_bazel_7:
    name: MacOS Intel (Bazel 7)
    bazel: 7.x
    platform: macos
    build_targets: *build_targets_bazel_6
    test_targets: *test_targets_bazel_6
    build_flags: *flags_bazel_less_than_9
    test_flags: *flags_bazel_less_than_9
    coverage_flags: *coverage_flags_bazel_less_than_9
    coverage_targets: *test_targets_bazel_6
  macos_bazel_7:
    name: MacOS (Bazel 7)
    bazel: 7.x
    platform: macos_arm64
    build_targets: *build_targets_bazel_6
    test_targets: *test_targets_bazel_6
    build_flags: *flags_bazel_less_than_9
    test_flags: *flags_bazel_less_than_9
    coverage_flags: *coverage_flags_bazel_less_than_9
    coverage_targets: *test_targets_bazel_6
  windows_bazel_7:
    name: Windows (Bazel 7)
    bazel: 7.x
    platform: windows
    build_targets: *build_targets_bazel_6
    test_targets: *test_targets_bazel_6
    build_flags: *flags_bazel_less_than_9
    test_flags: *flags_bazel_less_than_9

# Bazel 8
  ubuntu2004_bazel_8:
    name: Ubuntu 20.04 (Bazel 8)
    bazel: 8.x
    platform: ubuntu2004
    build_targets: *build_targets_bazel_6
    test_targets: *test_targets_bazel_6
    build_flags: *flags_bazel_less_than_9
    test_flags: *flags_bazel_less_than_9
    coverage_flags: *coverage_flags_bazel_less_than_9
    coverage_targets: *test_targets_bazel_6
  macos_intel_bazel_8:
    name: MacOS Intel (Bazel 8)
    bazel: 8.x
    platform: macos
    build_targets: *build_targets_bazel_6
    test_targets: *test_targets_bazel_6
    build_flags: *flags_bazel_less_than_9
    test_flags: *flags_bazel_less_than_9
    coverage_flags: *coverage_flags_bazel_less_than_9
    coverage_targets: *test_targets_bazel_6
  macos_bazel_8:
    name: MacOS (Bazel 8)
    bazel: 8.x
    platform: macos_arm64
    build_targets: *build_targets_bazel_6
    test_targets: *test_targets_bazel_6
    build_flags: *flags_bazel_less_than_9
    test_flags: *flags_bazel_less_than_9
    coverage_flags: *coverage_flags_bazel_less_than_9
    coverage_targets: *test_targets_bazel_6
  windows_bazel_8:
    name: Windows (Bazel 8)
    bazel: 8.x
    platform: windows
    build_targets: *build_targets_bazel_6
    test_targets: *test_targets_bazel_6
    build_flags: *flags_bazel_less_than_9
    test_flags: *flags_bazel_less_than_9

# Bazel 9
  ubuntu2004:
    name: Ubuntu 20.04 (Bazel 9)
    bazel: 9.x
    platform: ubuntu2004
    build_targets: *build_targets
    test_targets: *test_targets
    coverage_flags: *common_coverage_flags
    coverage_targets: *test_targets
  macos_intel:
    name: MacOS Intel (Bazel 9)
    bazel: 9.x
    platform: macos
    build_targets: *build_targets
    test_targets: *test_targets
    coverage_flags: *common_coverage_flags
    coverage_targets: *test_targets
  macos:
    name: MacOS (Bazel 9)
    bazel: 9.x
    platform: macos_arm64
    build_targets: *build_targets
    test_targets: *test_targets
    coverage_flags: *common_coverage_flags
    coverage_targets: *test_targets
  windows:
    name: Windows (Bazel 9)
    bazel: 9.x
    build_targets: *build_targets
    test_targets: *test_targets
  ubuntu_bzlmod:
    name: Ubuntu 20.04 (Bazel 9, bzlmod)
    bazel: 9.x
    platform: ubuntu2004
    build_flags:
      - "--enable_bzlmod"
      - "--ignore_dev_dependency"

  ubuntu_rule_based_toolchains:
    name: Ubuntu rule-based toolchains
    platform: ubuntu1804
    working_directory: examples/rule_based_toolchain
    build_flags:
      - "--enable_bzlmod"
    build_targets:
      - "//..."
    test_targets:
      - "//..."

  macos_intel_rule_based_toolchains:
    name: macOS rule-based toolchains
    platform: macos
    working_directory: examples/rule_based_toolchain
    build_flags:
      - "--enable_bzlmod"
    build_targets:
      - "//..."
  macos_rule_based_toolchains:
    name: macOS rule-based toolchains
    platform: macos_arm64
    working_directory: examples/rule_based_toolchain
    build_flags:
      - "--enable_bzlmod"
    build_targets:
      - "//..."
